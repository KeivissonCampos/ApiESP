<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor ESP32</title>

    <style>

        body{
            font-family:Arial;
            text-align:center;
            margin-top:50px;
        }

        #valor{
            font-size:80px;
            font-weight:bold;
            margin:20px;
        }

        button{
            font-size:25px;
            padding:15px 30px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <h1>Contador ESP32</h1>

    <div id="valor">0</div>

    <button onclick="zerar()">ZERAR CONTADOR</button>

    <script>

        async function atualizar(){

            let resposta = await fetch('/api/valor');

            let valor = await resposta.text();

            document.getElementById("valor").innerText = valor;
        }

        async function zerar(){

            await fetch('/api/comando?set=ZERAR');

            alert("Comando enviado");
        }

        atualizar();

        setInterval(atualizar,1000);

    </script>

</body>

</html>
